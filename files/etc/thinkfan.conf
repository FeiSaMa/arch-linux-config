sensors:
  - hwmon: /sys/class/hwmon
    name: coretemp
    indices: [1]

  - hwmon: /sys/class/hwmon
    name: thinkpad
    indices: [1, 3, 4, 5, 6, 7]

fans:
  - tpacpi: /proc/acpi/ibm/fan

levels:
  - [0, 0, 44]
  - [1, 44, 47]
  - [2, 47, 52]
  - [3, 52, 58]
  - [4, 58, 65]
  - [5, 65, 70]
  - [6, 70, 75]
  - [7, 75, 100]
