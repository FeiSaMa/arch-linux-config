    name: coretemp
    indices: [1]

  - hwmon: /sys/class/hwmon
    name: thinkpad
    indices: [1, 3, 4, 5, 6, 7]

fans:
  - tpacpi: /proc/acpi/ibm/fan

levels:
  - [0, 0, 40]
  - [1, 35, 43]
  - [2, 40, 48]
  - [3, 45, 55]
  - [4, 50, 62]
  - [5, 56, 68]
  - [6, 62, 72]
  - [7, 68, 100]
