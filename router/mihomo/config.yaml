# mihomo config for T14 Gen1 Router
# NOTE: GEOIP rule removed — MMDB download blocked in China, try scp from proxy machine if needed
port: 7899
socks-port: 7898
mixed-port: 7897
redir-port: 7895
tproxy-port: 7896
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9097
secret: router2025
external-controller-cors:
  allow-private-network: true
  allow-origins:
    - https://metacubex.github.io
    - https://yacd.metacubex.one
    - http://yacd.metacubex.one

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

dns:
  enable: true
  listen: 0.0.0.0:5353
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 114.114.114.114
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.arpa'
    - time.*.com
    - ntp.*.com
    - '*.msftncsi.com'
    - www.msftconnecttest.com

proxy-providers:
  iGG:
    type: http
    url: "https://feed.iggv5.com/c/714a8058-614e-4068-965a-682d2263d5b2/platform/clash/iGG-iGuge"
    interval: 1440
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: 🔰 节点选择
    type: select
    proxies:
      - 🚀 自动选择
      - DIRECT
    use:
      - iGG
  - name: 🚀 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 150
    use:
      - iGG

rules:
  - IP-CIDR,198.18.0.1/16,DIRECT,no-resolve
  - IP-CIDR,223.5.5.5/32,DIRECT
  - IP-CIDR,114.114.114.114/32,DIRECT
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,cn,DIRECT
  - GEOSITE,geolocation-!cn,🔰 节点选择
  - MATCH,DIRECT
